<!-- ============================================================
     LOADER for section: PRACTICE - WAVE EXHIBIT
     Paste this ONCE into the Elementor HTML widget on the
     /creative-projects-wave-exhibit page (replacing its content).
     From then on it pulls the latest "PRACTICE - WAVE EXHIBIT.html"
     from GitHub automatically (~5 min after PUSH-UPDATES.bat).
     Parent section: Full Width, Stretch ON, padding 0.
     ============================================================ -->
<div id="frc-load-practice-wave-exhibit"></div>
<script>
(function () {
  var m = document.getElementById('frc-load-practice-wave-exhibit');
  if (!m || m.dataset.initialized === '1') return;
  m.dataset.initialized = '1';

  fetch('https://raw.githubusercontent.com/santibraby/formarosacreative.com/main/HTML/Sections/PRACTICE%20-%20WAVE%20EXHIBIT.html', { cache: 'no-cache' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function (html) {
      m.innerHTML = html;
      // innerHTML does not execute <script> tags — recreate them so they run
      m.querySelectorAll('script').forEach(function (old) {
        var s = document.createElement('script');
        if (old.src) { s.src = old.src; } else { s.textContent = old.textContent; }
        old.parentNode.replaceChild(s, old);
      });
    })
    .catch(function (e) { console.error('FRC loader (PRACTICE - WAVE EXHIBIT):', e); });
})();
</script>
