<!-- ============================================================
     GENERIC ARTICLE LOADER - works for EVERY article page.
     Paste this ONCE into the Elementor HTML widget on any
     article page (replacing its content).

     >>> THE ONLY THING TO EDIT PER PAGE: <<<
     the data-article value below. It must match a file in
     HTML/Articles/ (without the .md extension).
       e.g. data-article="PRACTICE - WAVE EXHIBIT"
            loads HTML/Articles/PRACTICE - WAVE EXHIBIT.md

     Everything else (chrome, styling, behavior) comes from
     HTML/Sections/ARTICLE - TEMPLATE.html, shared by all
     article pages. Do not edit the URL below.

     Parent section: Full Width, Stretch ON, padding 0,
     Template: Elementor Canvas.
     Live ~5 min after PUSH-UPDATES.bat.
     ============================================================ -->
<div id="frc-load-article" data-article="PRACTICE - WAVE EXHIBIT"></div>
<script>
(function () {
  var m = document.getElementById('frc-load-article');
  if (!m || m.dataset.initialized === '1') return;
  m.dataset.initialized = '1';

  fetch('https://raw.githubusercontent.com/santibraby/formarosacreative.com/main/HTML/Sections/ARTICLE%20-%20TEMPLATE.html', { cache: 'no-cache' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function (html) {
      m.innerHTML = html;
      // innerHTML does not execute <script> tags - recreate them so they run
      m.querySelectorAll('script').forEach(function (old) {
        var s = document.createElement('script');
        if (old.src) { s.src = old.src; } else { s.textContent = old.textContent; }
        old.parentNode.replaceChild(s, old);
      });
    })
    .catch(function (e) { console.error('FRC loader (ARTICLE):', e); });
})();
</script>
