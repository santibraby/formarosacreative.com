<!-- ============================================================
     Section: COVERS view - 2-column grid of article covers
     Class:   frc-covers
     Notes:   Elementor section settings:
                - Template: Elementor Canvas (globals off)
                - Layout: Full Width, Stretch section: ON
                - Section padding: 0 (top/right/bottom/left)
                - Column padding: 0
                - Drop this in a section BELOW the frc-header widget.
                - If frc-hero-scroll also lives on the page, both widgets will
                  auto-toggle based on the <html data-view="..."> attribute set
                  by the header's SCROLL/COVERS buttons. COVERS is hidden while
                  data-view="scroll".
              Do NOT apply transform/filter/will-change to the parent section.
              (The header's position:fixed would break.)

     AUTO-UPDATING: the covers are generated from
       HTML/Articles/ARTICLES - INDEX.md  (fetched from GitHub).
     One line per article there: FILE NAME | Label | link | cover.
     Line order = display order. Edit the index + push; this
     section never needs touching for new articles.

     Filtering: category comes from the file-name prefix in the
     index (PRACTICE / INSPIRATION / CONTEXT). ALL is default.
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<section class="frc-covers" data-frc-covers aria-label="Project covers">

  <nav class="frc-covers__filters" aria-label="Filter covers by category">
    <button type="button" class="frc-covers__filter is-active" data-frc-filter="all" aria-pressed="true"><span class="frc-covers__mark" aria-hidden="true"></span>ALL</button>
    <button type="button" class="frc-covers__filter" data-frc-filter="practice" aria-pressed="false"><span class="frc-covers__mark" aria-hidden="true"></span>PRACTICE</button>
    <button type="button" class="frc-covers__filter" data-frc-filter="inspiration" aria-pressed="false"><span class="frc-covers__mark" aria-hidden="true"></span>INSPIRATION</button>
    <button type="button" class="frc-covers__filter" data-frc-filter="context" aria-pressed="false"><span class="frc-covers__mark" aria-hidden="true"></span>CONTEXT</button>
  </nav>

  <p class="frc-covers__empty" data-frc-loading>LOADING PROJECTS ...</p>
  <p class="frc-covers__empty" data-frc-empty hidden>NO ENTRIES YET</p>

  <div class="frc-covers__grid"></div>
</section>

<style>
  .frc-covers {
    /* local tokens - do not leak */
    --bg: #111111;
    --ink-head: #d4c4b5;
    --ink-dim: #8e8578;
    --hover: #e5d6c6;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

    position: relative;
    width: 100%;
    background: var(--bg);
    color: var(--ink-head);
    font-family: var(--font-mono);
    box-sizing: border-box;

    /* Top padding clears the fixed header (tagline + bar ~= 120-150px),
       + breathing room. Side padding keeps images off the edge on desktop.
       Bottom padding feels like a portfolio terminus. */
    padding: clamp(140px, 16vh, 200px) clamp(16px, 2.5vw, 40px) clamp(80px, 14vh, 180px);
  }

  .frc-covers *,
  .frc-covers *::before,
  .frc-covers *::after { box-sizing: border-box; }

  /* -- Category filter row ----------------------------------- */
  .frc-covers__filters {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(18px, 2.4vw, 36px);
    margin: 0 0 clamp(48px, 8vh, 96px);
  }

  .frc-covers__filter {
    appearance: none;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: clamp(12px, 0.9vw, 14px);
    letter-spacing: 0.02em;
    color: var(--ink-dim);
    transition: color 260ms ease;
  }

  .frc-covers__filter:hover,
  .frc-covers__filter:focus-visible { color: var(--hover); }

  .frc-covers__filter:focus-visible {
    outline: 1px dotted currentColor;
    outline-offset: 4px;
  }

  .frc-covers__filter.is-active { color: var(--ink-head); }

  /* [X]/[ ] state marks - matches the header's SCROLL/COVERS notation */
  .frc-covers__mark::before { content: "[ ] "; white-space: pre; }
  .frc-covers__filter.is-active .frc-covers__mark::before { content: "[X] "; }

  /* Empty / loading state notes */
  .frc-covers__empty {
    margin: 0;
    font-family: var(--font-mono);
    font-size: clamp(12px, 0.9vw, 14px);
    letter-spacing: 0.02em;
    color: var(--ink-dim);
  }

  /* CSS Grid - deterministic row-by-row ordering (1 top-left,
     2 top-right, 3 second-row-left, 4 second-row-right, ...) so the
     index order is respected. align-items: start means each row
     height = max of its two items, with no stretching. */
  .frc-covers__grid {
    display: grid;
    grid-template-columns: 1fr;
    column-gap: clamp(20px, 2.5vw, 40px);
    row-gap: clamp(256px, 44vh, 560px);   /* doubled vertical rhythm */
    align-items: start;
  }

  @media (min-width: 720px) {
    .frc-covers__grid { grid-template-columns: 1fr 1fr; }
  }

  /* items are links to the article pages (index-driven) */
  .frc-covers__item {
    margin: 0;
    display: block;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .frc-covers__itemfig { margin: 0; display: block; }

  /* Filtered-out covers */
  .frc-covers__item.is-hidden { display: none; }

  .frc-covers__label {
    display: block;
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: clamp(12px, 0.9vw, 14px);
    letter-spacing: 0.02em;
    color: var(--ink-head);
    opacity: 0;                 /* hidden by default - reveal on hover */
    margin-bottom: clamp(10px, 1.2vh, 18px);
    transition: color 260ms ease, opacity 260ms ease;
  }

  .frc-covers__frame {
    position: relative;
    width: 100%;
    overflow: hidden;
    background: #1a1a1a; /* prevents white flash before image paints */
  }

  .frc-covers__img {
    display: block;
    width: 100%;
    height: auto;
    opacity: 0;
    transition: opacity 700ms ease, filter 500ms ease;
    filter: saturate(0.95);

    /* Ken Burns: slow, continuous scale + micro-pan. Runs infinitely,
       alternating direction, so the image breathes. Different variant
       per item (see :nth-child overrides below) keeps the grid from
       feeling mechanical. Paused until is-loaded to avoid jank. */
    transform-origin: 50% 50%;
    will-change: transform;
    animation: frc-kb-a 30s ease-in-out infinite alternate;
    animation-play-state: paused;
  }

  .frc-covers__img.is-loaded {
    opacity: 1;
    animation-play-state: running;
  }

  /* Ken Burns variants - same scale arc, four pan directions.
     More dramatic: scale 1 -> 1.22 with 5-7% pan distance, so the
     viewer sees real camera-push energy rather than micro-breathing. */
  @keyframes frc-kb-a {
    0%   { transform: scale(1.00) translate(0%, 0%); }
    100% { transform: scale(1.22) translate(-6%, -4%); }
  }
  @keyframes frc-kb-b {
    0%   { transform: scale(1.00) translate(0%, 0%); }
    100% { transform: scale(1.22) translate( 6%, -4%); }
  }
  @keyframes frc-kb-c {
    0%   { transform: scale(1.00) translate(0%, 0%); }
    100% { transform: scale(1.22) translate(-5%,  6%); }
  }
  @keyframes frc-kb-d {
    0%   { transform: scale(1.00) translate(0%, 0%); }
    100% { transform: scale(1.22) translate( 5%,  6%); }
  }

  /* Per-item variety: different keyframe, duration, and negative delay
     so each cover is at a different phase of its own cycle. Items past
     14 fall back to the base 30s variant, which is fine. */
  .frc-covers__item:nth-child(1)  .frc-covers__img { animation-name: frc-kb-a; animation-duration: 18s; animation-delay: -3s;  }
  .frc-covers__item:nth-child(2)  .frc-covers__img { animation-name: frc-kb-b; animation-duration: 22s; animation-delay: -12s; }
  .frc-covers__item:nth-child(3)  .frc-covers__img { animation-name: frc-kb-c; animation-duration: 20s; animation-delay: -7s;  }
  .frc-covers__item:nth-child(4)  .frc-covers__img { animation-name: frc-kb-d; animation-duration: 24s; animation-delay: -15s; }
  .frc-covers__item:nth-child(5)  .frc-covers__img { animation-name: frc-kb-b; animation-duration: 21s; animation-delay: -9s;  }
  .frc-covers__item:nth-child(6)  .frc-covers__img { animation-name: frc-kb-c; animation-duration: 17s; animation-delay: -5s;  }
  .frc-covers__item:nth-child(7)  .frc-covers__img { animation-name: frc-kb-a; animation-duration: 23s; animation-delay: -17s; }
  .frc-covers__item:nth-child(8)  .frc-covers__img { animation-name: frc-kb-d; animation-duration: 19s; animation-delay: -2s;  }
  .frc-covers__item:nth-child(9)  .frc-covers__img { animation-name: frc-kb-c; animation-duration: 22s; animation-delay: -11s; }
  .frc-covers__item:nth-child(10) .frc-covers__img { animation-name: frc-kb-b; animation-duration: 18s; animation-delay: -6s;  }
  .frc-covers__item:nth-child(11) .frc-covers__img { animation-name: frc-kb-d; animation-duration: 20s; animation-delay: -14s; }
  .frc-covers__item:nth-child(12) .frc-covers__img { animation-name: frc-kb-a; animation-duration: 23s; animation-delay: -8s;  }
  .frc-covers__item:nth-child(13) .frc-covers__img { animation-name: frc-kb-c; animation-duration: 19s; animation-delay: -13s; }
  .frc-covers__item:nth-child(14) .frc-covers__img { animation-name: frc-kb-b; animation-duration: 21s; animation-delay: -19s; }

  /* hover - label fades in, image un-desaturates. Animation continues;
     pausing on hover would jitter as it resumes. */
  .frc-covers__item:hover .frc-covers__label,
  .frc-covers__item:focus-within .frc-covers__label,
  .frc-covers__item:focus-visible .frc-covers__label { color: var(--hover); opacity: 1; }
  .frc-covers__item:hover .frc-covers__img { filter: saturate(1.05); }
  .frc-covers__item:focus-visible { outline: 1px dotted var(--hover); outline-offset: 6px; }

  /* Hide COVERS when SCROLL view is active (header sets this attr) */
  html[data-view="scroll"] .frc-covers { display: none; }

  /* Reduced motion - no Ken Burns, no fade/rise */
  @media (prefers-reduced-motion: reduce) {
    .frc-covers__img {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
      animation: none !important;
    }
    .frc-covers__label { transition: none !important; }
    .frc-covers__filter { transition: none !important; }
  }

  /* mobile - single column, tighter spacing */
  @media (max-width: 719px) {
    .frc-covers {
      padding: clamp(120px, 14vh, 160px) clamp(14px, 4vw, 20px) clamp(64px, 10vh, 100px);
    }
    .frc-covers__filters {
      gap: 16px 20px;
      margin-bottom: clamp(40px, 6vh, 64px);
    }
    .frc-covers__grid { row-gap: clamp(192px, 32vh, 288px); }  /* doubled */
    /* Touch devices can't hover, so the hover-only label reveal never
       fires. Show labels by default on mobile so viewers always see
       project titles alongside the image. */
    .frc-covers__label { opacity: 1; }
  }
</style>

<script>
(function () {
  var widget = document.querySelector('.frc-covers');
  if (!widget || widget.dataset.initialized === '1') return;
  widget.dataset.initialized = '1';

  var INDEX_URL = 'https://raw.githubusercontent.com/santibraby/formarosacreative.com/main/HTML/Articles/ARTICLES%20-%20INDEX.md';

  var grid = widget.querySelector('.frc-covers__grid');
  var loadingMsg = widget.querySelector('[data-frc-loading]');
  var emptyMsg = widget.querySelector('[data-frc-empty]');

  /* Remember a category picked in the header's FILTERS accordion
     even if it arrives while the index is still being fetched. */
  var pendingCat = 'all';
  window.addEventListener('frc:filter-change', function (ev) {
    if (ev && ev.detail && ev.detail.cat) pendingCat = ev.detail.cat;
  });

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* one line per article: FILE NAME | Label | page link | cover url
     line order = display order; # lines and blanks are ignored */
  function parseIndex(text) {
    var out = [];
    text.replace(/\r/g, '').split('\n').forEach(function (line) {
      var t = line.trim();
      if (!t || t.charAt(0) === '#') return;
      var parts = t.split('|').map(function (p) { return p.trim(); });
      if (parts.length < 4 || !parts[2] || !parts[3]) return;
      out.push({
        name: parts[0],
        label: parts[1] || parts[0],
        link: parts[2],
        img: parts[3],
        category: parts[0].split(' - ')[0].trim().toLowerCase()
      });
    });
    return out;
  }

  function render(entries) {
    var html = '';
    entries.forEach(function (e, i) {
      var num = (i + 1 < 10 ? '0' : '') + (i + 1);
      html += '<a class="frc-covers__item" data-category="' + esc(e.category) + '" href="' + esc(e.link) + '">' +
              '<figure class="frc-covers__itemfig">' +
              '<figcaption class="frc-covers__label">' + num + '. ' + esc(e.label) + '</figcaption>' +
              '<div class="frc-covers__frame">' +
              '<img class="frc-covers__img" src="' + esc(e.img) + '" alt="' + esc(e.label) + '"' +
              ' loading="' + (i < 4 ? 'eager' : 'lazy') + '" decoding="async">' +
              '</div></figure></a>';
    });
    grid.innerHTML = html;
  }

  function initCovers() {
    /* Fade/rise each image in as it loads (independent of scroll) */
    widget.querySelectorAll('.frc-covers__img').forEach(function (img) {
      if (img.complete && img.naturalWidth > 0) {
        img.classList.add('is-loaded');
      } else {
        img.addEventListener('load', function () { img.classList.add('is-loaded'); }, { once: true });
        img.addEventListener('error', function () { img.classList.add('is-loaded'); }, { once: true });
      }
    });

    /* Category filter (ALL / PRACTICE / INSPIRATION / CONTEXT) */
    var filterBtns = widget.querySelectorAll('[data-frc-filter]');
    var items = widget.querySelectorAll('.frc-covers__item');

    function applyFilter(cat) {
      var visible = 0;
      items.forEach(function (item) {
        var show = (cat === 'all') || (item.dataset.category === cat);
        item.classList.toggle('is-hidden', !show);
        if (show) visible++;
      });
      if (emptyMsg) emptyMsg.hidden = (visible !== 0);
      filterBtns.forEach(function (btn) {
        var active = (btn.dataset.frcFilter === cat);
        btn.classList.toggle('is-active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    filterBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        applyFilter(btn.dataset.frcFilter);
        /* keep the header's FILTERS accordion in sync */
        window.dispatchEvent(new CustomEvent('frc:filter-change', { detail: { cat: btn.dataset.frcFilter } }));
      });
    });

    /* filter picked in the header's FILTERS accordion */
    window.addEventListener('frc:filter-change', function (ev) {
      if (ev && ev.detail && ev.detail.cat) applyFilter(ev.detail.cat);
    });

    applyFilter(pendingCat);
  }

  fetch(INDEX_URL, { cache: 'no-cache' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function (text) {
      render(parseIndex(text));
      if (loadingMsg) loadingMsg.remove();
      initCovers();
    })
    .catch(function (e) {
      if (loadingMsg) loadingMsg.textContent = 'COULD NOT LOAD PROJECTS (' + (e && e.message ? e.message : e) + ')';
    });
})();
</script>
